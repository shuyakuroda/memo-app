<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memo App</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <div class="container">
    <h1>ミニ メモアプリ</h1>

    <p id="memoCount">メモ 0件</p>

    <form id="memoForm">
      <input type="text" id="memoInput" placeholder="メモを入力">
      <button type="submit">追加</button>
    </form>


    <div class="filter-buttons">
      <button id="showAll">すべて</button>
      <button id="showActive">未完了</button>
      <button id="showCompleted">完了</button>
    </div>

    <ul id="memoList"></ul>
  </div>

  <script src="./script.js"></script>
</body>

</html>
